<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Escolar y Asistencia QR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen text-gray-800">

    <nav class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🏫 Sistema de Gestión Estudiantil</h1>
            <button onclick="exportarBackup()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg font-semibold text-sm transition shadow">
                💾 Exportar Backup (.js)
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6 space-y-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 lg:col-span-1">
                <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
                    📷 Escáner de Asistencia QR
                </h2>
                <div id="reader" class="w-full bg-gray-50 rounded-lg overflow-hidden border border-dashed border-gray-300"></div>
                <div class="mt-4 flex gap-2">
                    <button onclick="encenderCamara()" class="flex-1 bg-blue-500 text-white py-2 rounded-lg font-medium text-sm hover:bg-blue-600 transition">
                        Iniciar Cámara
                    </button>
                    <button onclick="detenerCamara()" class="flex-1 bg-red-500 text-white py-2 rounded-lg font-medium text-sm hover:bg-red-600 transition">
                        Detener
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-700">📅 Control de Asistencia Diario</h2>
                    <input type="date" id="fechaAsistencia" class="border rounded-lg p-2 text-sm bg-gray-50" onchange="renderAsistencias()">
                </div>
                <div class="overflow-x-auto max-h-64">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b bg-gray-50 text-xs font-semibold text-gray-600 uppercase">
                                <th class="p-3">Estudiante</th>
                                <th class="p-3 text-center">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAsistencias" class="divide-y text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">👥 Padrón de Estudiantes</h2>
                    <p class="text-xs text-gray-500">Registrar, editar, eliminar o generar códigos QR.</p>
                </div>
                <button onclick="modalAgregarEstudiante()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-medium text-sm transition flex items-center justify-center gap-2 shadow-sm">
                    ➕ Nuevo Estudiante
                </button>
            </div>

            <div class="overflow-x-auto rounded-xl border border-gray-200">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b text-xs font-bold text-gray-600 uppercase tracking-wider">
                            <th class="p-4">DNI</th>
                            <th class="p-4">Nombres y Apellidos</th>
                            <th class="p-4">Género</th>
                            <th class="p-4">Edad</th>
                            <th class="p-4">Celular</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEstudiantes" class="divide-y divide-gray-200 text-sm">
                        </tbody>
                </table>
            </div>
