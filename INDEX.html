<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner QR con Historial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #1e293b;
        }

        /* Zona del Escáner */
        #reader {
            width: 100%;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Botones */
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
            display: none; /* Se muestra solo cuando la cámara está activa */
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        /* Sección de Historial */
        .history-section {
            margin-top: 25px;
            text-align: left;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #475569;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
        }

        .clear-btn:hover {
            color: #64748b;
        }

        .history-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #2563eb;
            font-size: 0.9rem;
        }

        .item-data {
            font-weight: 600;
            color: #1e293b;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .item-timestamp {
            font-size: 0.75rem;
            color: #64748b;
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            padding: 20px 0;
        }
    </style>

    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="container">
        <h1>📷 Escáner QR Inteligente</h1>
        
        <div id="reader"></div>

        <button id="btn-start" class="btn btn-primary" onclick="iniciarEscaneo()">Activar Cámara</button>
        <button id="btn-stop" class="btn btn-danger" onclick="detenerEscaneo()">Detener Cámara</button>

        <div class="history-section">
            <div class="history-header">
                <span class="history-title">Registros Escaneados</span>
                <button class="clear-btn" onclick="limpiarHistorial()">Borrar todo</button>
            </div>
            <ul id="history-list" class="history-list">
                </ul>
        </div>
    </div>

    <script>
        let html5QrCode;
        let registros = JSON.parse(localStorage.getItem('qr_history')) || [];

        // Inicializar mostrando los registros guardados previamente
        window.onload = () => {
            actualizarInterfazHistorial();
        };

        function iniciarEscaneo() {
            // Instanciar el escáner en el contenedor "reader"
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 10,                 // Cuadros por segundo a procesar
                qrbox: { width: 250, height: 250 } // Área de enfoque del QR
            };

            // Ajustes visuales de botones
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'block';

            // Iniciar la cámara apuntando por defecto a la cámara trasera ('environment')
            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    // Acción al reconocer un código QR con éxito
                    registrarCodigo(decodedText);
                    detenerEscaneo(); // Detiene la cámara tras la lectura (opcional)
                },
                (errorMessage) => {
                    // Error de escaneo continuo (silenciado para evitar saturar la consola)
                }
            ).catch((err) => {
                console.error("Error al iniciar cámara: ", err);
                alert("No se pudo acceder a la cámara. Asegúrate de otorgar los permisos necesarios y navegar bajo un entorno HTTPS.");
                restablecerBotones();
            });
        }

        function detenerEscaneo() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').innerHTML = ''; // Limpia el contenedor
                    restablecerBotones();
                }).catch((err) => {
                    console.error("Error al detener la cámara: ", err);
                });
            }
        }

        function restablecerBotones() {
            document.getElementById('btn-start').style.style.display = 'block';
            document.getElementById('btn-stop').style.display = 'none';
        }

        function registrarCodigo(contenido) {
            // Capturar la fecha y hora exacta del momento de lectura
            const ahora = new Date();
            const fechaHoraString = ahora.toLocaleDateString() + ' - ' + ahora.toLocaleTimeString();

            const nuevoRegistro = {
                texto: contenido,
                timestamp: fechaHoraString
            };

            // Añadir al inicio del arreglo para mostrar primero lo más reciente
            registros.unshift(nuevoRegistro);

            // Guardar permanentemente en el almacenamiento local del navegador (LocalStorage)
            localStorage.setItem('qr_history', JSON.stringify(registros));

            // Alerta sonora visual nativa antes de actualizar
            actualizarInterfazHistorial();
            
            // Un pequeño aviso en pantalla
            alert(`¡Código detectado con éxito!\n\nContenido: ${contenido}`);
        }

        function actualizarInterfazHistorial() {
            const listaUI = document.getElementById('history-list');
            listaUI.innerHTML = '';

            if (registros.length === 0) {
                listaUI.innerHTML = '<li class="empty-state">No hay códigos registrados todavía.</li>';
                return;
            }

            registros.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <div class="item-data">${filtrarHTML(item.texto)}</div>
                    <div class="item-timestamp">📅 ${item.timestamp}</div>
                `;
                listaUI.appendChild(li);
            });
        }

        function limpiarHistorial() {
            if (confirm("¿Estás seguro de que deseas borrar todo el historial acumulado?")) {
                registros = [];
                localStorage.removeItem('qr_history');
                actualizarInterfazHistorial();
            }
        }

        // Función de seguridad básica para evitar problemas si el QR lee código HTML malicioso
        function filtrarHTML(cadena) {
            const temporal = document.createElement('div');
            temporal.innerText = cadena;
            return temporal.innerHTML;
        }
    </script>
</body>
</html>
